[tool.pytest.ini_options]
minversion = "8.0"
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:google.*",
    "ignore::DeprecationWarning:pydantic.*",
]
markers = [
    "unit: deterministic unit tests (no I/O, no network, no LLM calls).",
    "integration: tests that exercise real templates, filesystems, or subprocesses.",
]

[tool.coverage.run]
branch = true
source = ["app"]
omit = [
    "app/app_utils/deploy.py",
    "app/agent_engine_app.py",
    "app/shared/logging_config.py",
    "app/shared/telemetry.py",
    "app/prompts/*",
    "*/__pycache__/*",
    "tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
skip_covered = false
precision = 1
